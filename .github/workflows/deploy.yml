name: Deploy to Ubuntu Server

# ทำงานเมื่อ push ไป main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Deploy to server via SSH
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # ไปที่ directory โปรเจกต์
            cd /var/www/thaiherb
            
            # Pull code ใหม่
            # Force sync with remote (discard local changes)
            git fetch origin
            git reset --hard origin/main
            
            # Build และ Restart container
            docker-compose down
            docker-compose up -d --build
            
            # ลบ images เก่าที่ไม่ใช้
            docker image prune -f
            
            # แสดงสถานะ
            echo "✅ Deploy completed!"
            docker ps --filter "name=thaiherb"
